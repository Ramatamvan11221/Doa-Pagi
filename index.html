<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Doa Harian</title>
    <meta name="description" content="Website doa harian pribadi">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#F8F7F3">
</head>

<body>

    <!-- Floating Controls -->
    <aside class="floating-menu">

        <button id="themeToggle" title="Dark Mode">
            🌙
        </button>

        <button id="increaseFont" title="Perbesar Font">
            A+
        </button>

        <button id="decreaseFont" title="Perkecil Font">
            A-
        </button>

        <button id="scrollTop" title="Kembali ke Atas">
            ↑
        </button>

    </aside>

    <!-- Header -->
    <header class="hero">

        <div class="cross">
            ✝
        </div>

        <h1>Doa Harian</h1>

        <p>
            Mulailah harimu bersama Tuhan.
        </p>

    </header>

    <!-- Semua doa akan dirender oleh JavaScript -->
    <main id="content">

    </main>

    <script src="prayers.js"></script>
    <script src="settings.js"></script>
    <script src="script.js"></script>

</body>

</html>
