<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#F8F7F3">

    <title>Doa Harian</title>
    <meta name="description" content="Website doa harian pribadi">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Source+Serif+4:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

    <meta name="theme-color" content="#F8F7F3">

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <!-- Floating Controls -->
    <aside class="floating-menu">
    
        <div id="floatingActions" class="floating-actions">

        <button id="themeToggle">
            <i data-lucide="moon"></i>
        </button>

        <button id="increaseFont">
            A+
        </button>

        <button id="decreaseFont">
            A-
        </button>

        <button id="scrollTop">
            <i data-lucide="arrow-up"></i>
        </button>

        </div>
    
        <button id="menuToggle">
        
            <i data-lucide="settings-2"></i>
        
        </button>
    
    </aside>

    <!-- Header -->
    <header class="hero">

        <div class="cross">
            ✝
        </div>

        <h1>Doa Harian</h1>

        <p>
            Mulailah harimu bersama Tuhan.
        </p>

    </header>

    <button id="backButton" class="floating-back" hidden>
        <i data-lucide="house"></i>
    </button>

    <!-- Semua doa akan dirender oleh JavaScript -->
    <main id="content">

    </main>

    <script src="prayers.js"></script>
    <script src="settings.js"></script>
    <script src="script.js"></script>

</body>

</html>
